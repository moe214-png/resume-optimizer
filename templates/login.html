<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问口令</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --panel: #ffffff;
            --text: #20242c;
            --muted: #657084;
            --line: #dce1ea;
            --primary: #1f7a63;
            --primary-dark: #16634f;
            --danger-bg: #fff1f0;
            --danger: #b42318;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        main {
            width: min(420px, calc(100% - 32px));
            padding: 28px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 18px 45px rgba(32, 36, 44, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 26px;
            letter-spacing: 0;
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
            line-height: 1.7;
        }

        form {
            display: grid;
            gap: 12px;
        }

        label { font-weight: 700; }

        input {
            width: 100%;
            min-height: 44px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font: inherit;
        }

        button {
            width: fit-content;
            min-height: 44px;
            padding: 0 20px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover { background: var(--primary-dark); }

        .error {
            padding: 10px 12px;
            border-radius: 6px;
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid #ffccc7;
        }
    </style>
</head>
<body>
    <main>
        <h1>访问口令</h1>
        <p>请输入口令后继续使用简历优化工具。</p>
        <form method="POST">
            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}
            <label for="password">口令</label>
            <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>
            <button type="submit">进入</button>
        </form>
    </main>
</body>
</html>
